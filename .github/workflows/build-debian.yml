name: Build Debian Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Branch or tag'
        required: true
        default: 'adreno-debian-trixie'
      draft_release:
        description: 'Draft a new release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
      options: --privileged --user root

    steps:
      - name: Install dependencies
        run: |
          sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources
          apt update
          apt build-dep -y mesa
          apt install -y git ccache build-essential devscripts fakeroot quilt git-buildpackage pristine-tar libxfixes-dev libarchive-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure ccache
        run: |
          export CCACHE_DIR=/root/.ccache
          ccache --max-size=2G
          ccache --show-config
          ccache --zero-stats
          ccache --show-stats

      - name: Clone repository
        run: |
          cd ~
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone -b ${{ github.event.inputs.tag }} --depth 1 ${{ github.server_url }}/${{ github.repository }}.git

      - name: Build Mesa
        shell: bash
        run: |
          export CCACHE_DIR=/root/.ccache
          echo "Building Mesa..."
          cd ~/mesa-for-android-container
          origtargz
          gbp buildpackage -uc -us -jauto --git-ignore-branch
          echo "Mesa build completed successfully!"

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Collect packages
        shell: bash
        run: |
          cd ~
          rm -f *dev* *dbgsym* libosmesa*.deb mesa-va-drivers*.deb mesa-vdpau-drivers*.deb
          if [[ "${{ github.event.inputs.tag }}" == *"turnip"* ]]; then
            find . -maxdepth 1 -type f -name "*.deb" ! -name "mesa-vulkan-drivers*" -delete
          fi
          echo "Calculating sha256 checksums..."
          find . -maxdepth 1 \( -name "*.deb" \) -type f -printf "%P\0" | xargs -0 sha256sum | sort -k2 > sha256sums.txt
          cat sha256sums.txt && echo

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-for-android-container_${{ github.event.inputs.tag }}
          path: |
            ~/*.deb
            ~/sha256sums.txt
          retention-days: 90

  draft-release:
    if: ${{ github.event.inputs.draft_release == 'true' }}
    needs:
      - build
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Build release notes with checksums
        shell: bash
        run: |
          set -euo pipefail
          checksums=$(find ./artifacts -type f -name "sha256sums.txt" -exec cat {} \; -exec echo \; | awk 'NF>=2 {print $1 "  " $2}' | sort -k2,2)
          cat <<'EOF' > release_body.md
          ## Checksums
          ```plaintext
          EOF
          printf '%s\n' "$checksums" >> release_body.md
          printf '%s\n' '```' >> release_body.md

      - name: Set release title
        shell: bash
        run: |
          version=$(find ./artifacts -name 'mesa-vulkan-drivers*.deb' -type f -print -quit | xargs basename | cut -d'_' -f2)
          if [[ "${{ github.event.inputs.tag }}" == *"turnip"* ]]; then
            echo "RELEASE_TITLE=turnip-${version}_debian_trixie" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TITLE=${version}_debian_trixie" >> "$GITHUB_ENV"
          fi

      - name: Upload archives to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ env.RELEASE_TITLE }}
          draft: true
          body_path: release_body.md
          files: |
            ./artifacts/**/*.deb
