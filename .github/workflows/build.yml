name: Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Branch or tag'
        required: true
        default: 'adreno-main'
      draft_release:
        description: 'Draft a new release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  debian-trixie:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim
      options: --privileged --user root

    steps:
      - name: Install dependencies
        run: |
          sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources
          apt update
          apt build-dep -y mesa
          apt install -y git ccache libxfixes-dev libarchive-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure ccache
        run: |
          export CCACHE_DIR=/root/.ccache
          ccache --max-size=2G
          ccache --show-config
          ccache --zero-stats
          ccache --show-stats

      - name: Clone repository
        run: |
          cd ~
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone -b ${{ github.event.inputs.tag }} --depth 1 ${{ github.server_url }}/${{ github.repository }}.git

      - name: Set release name suffix
        shell: bash
        run: |
          cd ~/mesa-for-android-container
          version=$(grep -v '^[[:space:]]*$' VERSION | head -n1)
          build_date=$(TZ=Asia/Shanghai date +%Y%m%d)
          echo "MESA_RELEASE_NAME_SUFFIX=${version}-${build_date}_debian_trixie_arm64" >> "$GITHUB_ENV"

      - name: Build Mesa
        shell: bash
        run: |
          export CCACHE_DIR=/root/.ccache
          echo "Building Mesa..."
          cd ~/mesa-for-android-container
          meson setup build/ \
            --prefix=/usr \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=freedreno,zink,virgl,llvmpipe \
            -Dgallium-va=disabled \
            -Dgallium-mediafoundation=disabled \
            -Dvulkan-drivers=freedreno \
            -Dvulkan-layers= \
            -Degl=enabled \
            -Dgles2=enabled \
            -Dglvnd=enabled \
            -Dglx=dri \
            -Dlibunwind=disabled \
            -Dintel-rt=disabled \
            -Dmicrosoft-clc=disabled \
            -Dvalgrind=disabled \
            -Dgles1=disabled \
            -Dfreedreno-kmds=kgsl \
            -Dbuildtype=release
          ninja -C build/
          echo "Mesa build completed successfully!"

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package Mesa
        shell: bash
        run: |
          echo "Packaging Mesa..."
          cd ~/mesa-for-android-container
          mkdir /tmp/mesa-install-tmp
          DESTDIR=/tmp/mesa-install-tmp meson install -C build/
          tar -zcvf mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar.gz -C /tmp/mesa-install-tmp .
          rm -rf /tmp/mesa-install-tmp
          echo "Calculating sha256 checksums..."
          find . -maxdepth 1 \( -name "*.tar.gz" \) -type f -printf "%P\0" | xargs -0 sha256sum | sort -k2 > sha256sums.txt
          cat sha256sums.txt && echo
          echo "Packaging completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-for-android-container_${{ env.MESA_RELEASE_NAME_SUFFIX }}
          path: |
            ~/mesa-for-android-container/*.tar.gz
            ~/mesa-for-android-container/sha256sums.txt
          retention-days: 90

  ubuntu-noble:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Install dependencies
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt update
          sudo apt build-dep -y mesa
          sudo apt install -y git ccache libxfixes-dev libarchive-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-runner-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-runner-

      - name: Configure ccache
        run: |
          export CCACHE_DIR=~/.ccache
          ccache --max-size=2G
          ccache --show-config
          ccache --zero-stats
          ccache --show-stats

      - name: Clone repository
        run: |
          cd ~
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone -b ${{ github.event.inputs.tag }} --depth 1 ${{ github.server_url }}/${{ github.repository }}.git

      - name: Set release name suffix
        shell: bash
        run: |
          cd ~/mesa-for-android-container
          version=$(grep -v '^[[:space:]]*$' VERSION | head -n1)
          build_date=$(TZ=Asia/Shanghai date +%Y%m%d)
          echo "MESA_RELEASE_NAME_SUFFIX=${version}-${build_date}_ubuntu_noble_arm64" >> "$GITHUB_ENV"

      - name: Build Mesa
        shell: bash
        run: |
          export CCACHE_DIR=~/.ccache
          export LLVM_CONFIG=/usr/lib/llvm-20/bin/llvm-config
          echo "Building Mesa..."
          cd ~/mesa-for-android-container
          meson setup build/ \
            --prefix=/usr \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=freedreno,zink,virgl,llvmpipe \
            -Dgallium-va=disabled \
            -Dgallium-mediafoundation=disabled \
            -Dvulkan-drivers=freedreno \
            -Dvulkan-layers= \
            -Degl=enabled \
            -Dgles2=enabled \
            -Dglvnd=enabled \
            -Dglx=dri \
            -Dlibunwind=disabled \
            -Dintel-rt=disabled \
            -Dmicrosoft-clc=disabled \
            -Dvalgrind=disabled \
            -Dgles1=disabled \
            -Dfreedreno-kmds=kgsl \
            -Dbuildtype=release
          ninja -C build/
          echo "Mesa build completed successfully!"

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-runner-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package Mesa
        shell: bash
        run: |
          echo "Packaging Mesa..."
          cd ~/mesa-for-android-container
          sudo mkdir /tmp/mesa-install-tmp
          sudo DESTDIR=/tmp/mesa-install-tmp meson install -C build/
          sudo tar -zcvf mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar.gz -C /tmp/mesa-install-tmp .
          sudo chown $USER:$(id -gn) mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar.gz
          chmod 644 mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar.gz
          sudo rm -rf /tmp/mesa-install-tmp
          echo "Calculating sha256 checksums..."
          find . -maxdepth 1 \( -name "*.tar.gz" \) -type f -printf "%P\0" | xargs -0 sha256sum | sort -k2 > sha256sums.txt
          cat sha256sums.txt && echo
          echo "Packaging completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-for-android-container_${{ env.MESA_RELEASE_NAME_SUFFIX }}
          path: |
            ~/mesa-for-android-container/*.tar.gz
            ~/mesa-for-android-container/sha256sums.txt
          retention-days: 90

  fedora-43:
    runs-on: ubuntu-24.04-arm
    container:
      image: fedora:43
      options: --privileged --user root

    steps:
      - name: Install dependencies
        run: |
          echo "assumeyes=True" >> /etc/dnf/dnf.conf
          dnf install -y dnf-plugins-core git ccache libarchive-devel
          dnf config-manager setopt fedora-source.enabled=1 updates-source.enabled=1
          dnf makecache
          dnf builddep -y mesa

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure ccache
        run: |
          export CCACHE_DIR=/root/.ccache
          ccache --max-size=2G
          ccache --show-config
          ccache --zero-stats
          ccache --show-stats

      - name: Clone repository
        run: |
          cd ~
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone -b ${{ github.event.inputs.tag }} --depth 1 ${{ github.server_url }}/${{ github.repository }}.git

      - name: Set release name suffix
        shell: bash
        run: |
          cd ~/mesa-for-android-container
          version=$(grep -v '^[[:space:]]*$' VERSION | head -n1)
          build_date=$(TZ=Asia/Shanghai date +%Y%m%d)
          echo "MESA_RELEASE_NAME_SUFFIX=${version}-${build_date}_fedora_43_arm64" >> "$GITHUB_ENV"

      - name: Build Mesa
        shell: bash
        run: |
          export CCACHE_DIR=/root/.ccache
          echo "Building Mesa..."
          cd ~/mesa-for-android-container
          meson setup build/ \
            --prefix=/usr \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=freedreno,zink,virgl,llvmpipe \
            -Dgallium-va=disabled \
            -Dgallium-mediafoundation=disabled \
            -Dvulkan-drivers=freedreno \
            -Dvulkan-layers= \
            -Degl=enabled \
            -Dgles2=enabled \
            -Dglvnd=enabled \
            -Dglx=dri \
            -Dlibunwind=disabled \
            -Dintel-rt=disabled \
            -Dmicrosoft-clc=disabled \
            -Dvalgrind=disabled \
            -Dgles1=disabled \
            -Dfreedreno-kmds=kgsl \
            -Dbuildtype=release
          ninja -C build/
          echo "Mesa build completed successfully!"

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package Mesa
        shell: bash
        run: |
          echo "Packaging Mesa..."
          cd ~/mesa-for-android-container
          mkdir /tmp/mesa-install-tmp
          DESTDIR=/tmp/mesa-install-tmp meson install -C build/
          tar -zcvf mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar.gz -C /tmp/mesa-install-tmp .
          rm -rf /tmp/mesa-install-tmp
          echo "Calculating sha256 checksums..."
          find . -maxdepth 1 \( -name "*.tar.gz" \) -type f -printf "%P\0" | xargs -0 sha256sum | sort -k2 > sha256sums.txt
          cat sha256sums.txt && echo
          echo "Packaging completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-for-android-container_${{ env.MESA_RELEASE_NAME_SUFFIX }}
          path: |
            ~/mesa-for-android-container/*.tar.gz
            ~/mesa-for-android-container/sha256sums.txt
          retention-days: 90

  archlinux:
    runs-on: ubuntu-24.04-arm
    container:
      image: lfdevs/archlinuxarm:base-devel
      options: --privileged --user root

    steps:
      - name: Install dependencies
        run: |
          pacman -Syyu --noconfirm
          pacman -S --noconfirm sudo base-devel git ccache

      - name: Setup runner user
        run: |
          useradd -m -s /bin/bash runner
          echo "runner ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/runner
          chmod 0440 /etc/sudoers.d/runner
          mkdir -p /home/runner/.ccache
          chown -R runner:runner /home/runner

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-runner-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-runner-

      - name: Configure ccache
        run: |
          chown -R runner:runner /home/runner/.ccache
          sudo -u runner bash -c '
            export CCACHE_DIR=/home/runner/.ccache
            ccache --max-size=2G
            ccache --show-config
            ccache --zero-stats
            ccache --show-stats
          '

      - name: Clone repository
        run: |
          sudo -u runner bash -c '
            cd /home/runner
            git config --global user.email "actions@github.com"
            git config --global user.name "GitHub Actions"
            if [ "${{ github.event.inputs.tag }}" == "adreno-main" ]; then
              git clone -b freedreno --depth 1 https://github.com/lfdevs/archlinuxarm-PKGBUILDs.git
            elif [ "${{ github.event.inputs.tag }}" == "turnip-main" ]; then
              git clone -b turnip --depth 1 https://github.com/lfdevs/archlinuxarm-PKGBUILDs.git
            else
              git clone -b ${{ github.event.inputs.tag }} --depth 1 https://github.com/lfdevs/archlinuxarm-PKGBUILDs.git
            fi
          '

      - name: Set release name suffix
        shell: bash
        run: |
          cd /home/runner/archlinuxarm-PKGBUILDs/extra/mesa
          version=$(awk -F= '/^pkgver=/{print $2; exit}' PKGBUILD)
          build_date=$(TZ=Asia/Shanghai date +%Y%m%d)
          echo "MESA_RELEASE_NAME_SUFFIX=${version}-devel-${build_date}_archlinux_arm64" >> "$GITHUB_ENV"

      - name: Build Mesa
        shell: bash
        run: |
          sudo -u runner bash -c '
            export CCACHE_DIR=/home/runner/.ccache
            echo "Building Mesa..."
            cd /home/runner/archlinuxarm-PKGBUILDs/extra/mesa
            makepkg -s --noconfirm
            echo "Mesa build completed successfully!"
          '

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /home/runner/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-runner-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package Mesa
        shell: bash
        run: |
          echo "Packaging Mesa..."
          cd /home/runner/archlinuxarm-PKGBUILDs/extra/mesa
          tar -cvf mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar *.pkg.tar.xz
          echo "Calculating sha256 checksums..."
          find . -maxdepth 1 \( -name "*.tar" \) -type f -printf "%P\0" | xargs -0 sha256sum | sort -k2 > sha256sums.txt
          cat sha256sums.txt && echo
          echo "Packaging completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-for-android-container_${{ env.MESA_RELEASE_NAME_SUFFIX }}
          path: |
            /home/runner/archlinuxarm-PKGBUILDs/extra/mesa/*.tar
            /home/runner/archlinuxarm-PKGBUILDs/extra/mesa/sha256sums.txt
          retention-days: 90

  void-linux:
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged --user root

    steps:
      - name: Install dependencies
        run: |
          xbps-install -Syu
          xbps-install -y bash base-devel git ccache meson ninja pkg-config python3 \
            flex bison \
            libdrm-devel \
            libX11-devel libxcb-devel libXext-devel libXfixes-devel libXrandr-devel \
            libXxf86vm-devel libxshmfence-devel \
            wayland-devel wayland-protocols \
            libglvnd-devel \
            zlib-devel expat-devel \
            elfutils-devel \
            llvm18-devel clang18 \
            libxml2-devel \
            libarchive-devel \
            python3-Mako python3-packaging python3-yaml python3-ply \
            libffi-devel \
            libzstd-devel \
            glslang

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-void-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-void-

      - name: Configure ccache
        run: |
          export CCACHE_DIR=/root/.ccache
          ccache --max-size=2G
          ccache --show-config
          ccache --zero-stats
          ccache --show-stats

      - name: Clone repository
        run: |
          cd ~
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone -b ${{ github.event.inputs.tag }} --depth 1 ${{ github.server_url }}/${{ github.repository }}.git

      - name: Set release name suffix
        shell: bash
        run: |
          cd ~/mesa-for-android-container
          version=$(grep -v '^[[:space:]]*$' VERSION | head -n1)
          build_date=$(TZ=Asia/Shanghai date +%Y%m%d)
          echo "MESA_RELEASE_NAME_SUFFIX=${version}-${build_date}_void_arm64" >> "$GITHUB_ENV"

      - name: Build Mesa
        shell: bash
        run: |
          export CCACHE_DIR=/root/.ccache
          echo "Building Mesa..."
          cd ~/mesa-for-android-container
          meson setup build/ \
            --prefix=/usr \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=freedreno,zink,virgl,llvmpipe \
            -Dgallium-va=disabled \
            -Dgallium-mediafoundation=disabled \
            -Dvulkan-drivers=freedreno \
            -Dvulkan-layers= \
            -Degl=enabled \
            -Dgles2=enabled \
            -Dglvnd=enabled \
            -Dglx=dri \
            -Dlibunwind=disabled \
            -Dintel-rt=disabled \
            -Dmicrosoft-clc=disabled \
            -Dvalgrind=disabled \
            -Dgles1=disabled \
            -Dfreedreno-kmds=kgsl \
            -Dbuildtype=release
          ninja -C build/
          echo "Mesa build completed successfully!"

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /root/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-void-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package Mesa
        shell: bash
        run: |
          echo "Packaging Mesa..."
          cd ~/mesa-for-android-container
          mkdir /tmp/mesa-install-tmp
          DESTDIR=/tmp/mesa-install-tmp meson install -C build/
          tar -zcvf mesa-for-android-container_${MESA_RELEASE_NAME_SUFFIX}.tar.gz -C /tmp/mesa-install-tmp .
          rm -rf /tmp/mesa-install-tmp
          echo "Calculating sha256 checksums..."
          find . -maxdepth 1 \( -name "*.tar.gz" \) -type f -printf "%P\0" | xargs -0 sha256sum | sort -k2 > sha256sums.txt
          cat sha256sums.txt && echo
          echo "Packaging completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-for-android-container_${{ env.MESA_RELEASE_NAME_SUFFIX }}
          path: |
            ~/mesa-for-android-container/*.tar.gz
            ~/mesa-for-android-container/sha256sums.txt
          retention-days: 90

  draft-release:
    if: ${{ github.event.inputs.draft_release == 'true' }}
    needs:
      - debian-trixie
      - ubuntu-noble
      - fedora-43
      - archlinux
      - void-linux
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Build release notes with checksums
        shell: bash
        run: |
          set -euo pipefail
          checksums=$(find ./artifacts -type f -name "sha256sums.txt" -exec cat {} \; -exec echo \; | awk 'NF>=2 {print $1 "  " $2}' | sort -k2,2)
          cat <<'EOF' > release_body.md
          ## Checksums
          ```plaintext
          EOF
          printf '%s\n' "$checksums" >> release_body.md
          printf '%s\n' '```' >> release_body.md

      - name: Set release title
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          echo "RELEASE_TITLE=${tag#mesa-}" >> "$GITHUB_ENV"

      - name: Upload archives to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ env.RELEASE_TITLE }}
          draft: true
          body_path: release_body.md
          files: |
            ./artifacts/**/*.tar.gz
            ./artifacts/**/*.tar
